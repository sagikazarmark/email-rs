[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "No fixed upgrade is available; rsa is pulled transitively via jsonwebtoken/restate. Revisit when upstream releases a fix." },
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",

  "0BSD",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
