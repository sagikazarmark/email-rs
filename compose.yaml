services:
  restate:
    hostname: restate
    image: docker.restate.dev/restatedev/restate:latest
    ports:
      - 127.0.0.1:9070:9070
      - 127.0.0.1:9071:9071
      - 127.0.0.1:8080:8080
    environment:
      RESTATE_INGRESS__ADVERTISED_ADDRESS: "http://127.0.0.1:8080"
      RESTATE_ADMIN__ADVERTISED_ADDRESS: "http://127.0.0.1:9070"
    volumes:
      - restate-data:/restate-data

volumes:
  restate-data:
